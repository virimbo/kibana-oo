server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /login {
        proxy_pass http://backend:8000;
    }

    location /logout {
        proxy_pass http://backend:8000;
    }

    location /chat {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    location /data-views {
        proxy_pass http://backend:8000;
    }

    # AI model provider: list + per-session selection (Ollama / Mistral / off).
    # Without this the POST hits the static handler and 405s, so the backend
    # session never learns the chosen provider.
    location /llm-provider {
        proxy_pass http://backend:8000;
    }

    location /llm-providers {
        proxy_pass http://backend:8000;
    }

    location /dashboard/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Authorisation: the current user's permissions, and the super-admin grant
    # matrix. Without these the frontend can't read /me/permissions and hides all
    # admin nav (falls back to no access).
    location /me/ {
        proxy_pass http://backend:8000;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
    }

    # Unified alerting (Beheer → Alerting): status/config/toggle/history/audit.
    # Without this the /alerts/* calls fall through to index.html and the page
    # shows "Unexpected token '<' ... is not valid JSON".
    location /alerts/ {
        proxy_pass http://backend:8000;
    }
}
